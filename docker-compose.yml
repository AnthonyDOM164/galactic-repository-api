version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: galactic-db
    environment:
      POSTGRES_DB: galactic-tournament-api-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: galactic-tournament-api-container
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/galactic-tournament-api
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update